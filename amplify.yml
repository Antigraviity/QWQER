version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm ci
        - echo "Generating Prisma client..."
        - DATABASE_URL=$DATABASE_URL npx prisma generate --schema=prisma/schema.prisma
        - echo "Skipping migrate deploy - using db push instead..."
        - DATABASE_URL=$DATABASE_URL npx prisma db push --schema=prisma/schema.prisma --accept-data-loss
    build:
      commands:
        - echo "Building Next.js app..."
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
