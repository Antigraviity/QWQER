version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm ci
        - echo "Generating Prisma client..."
        - DATABASE_URL=$DATABASE_URL npx prisma generate --schema=prisma/schema.prisma
        - echo "Running Prisma migrations..."
        - DATABASE_URL=$DATABASE_URL npx prisma migrate deploy --schema=prisma/schema.prisma
    build:
      commands:
        - echo "Building Next.js app..."
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
